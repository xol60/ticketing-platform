spring:
  application:
    name: ticket-service

  # ── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
        # ── Batch insert / update support ──────────────────────────────────
        # order_inserts / order_updates must be at this level (hibernate.*),
        # NOT nested under jdbc — otherwise Hibernate silently ignores them.
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 50
          # Required for batching when entities carry @Version (optimistic lock)
          batch_versioned_data: true

  # ── Flyway ───────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

server:
  port: 8082

# ── Database routing (master/slave) ──────────────────────────────────────────
db:
  master:
    url: ${DB_MASTER_URL:jdbc:postgresql://localhost:5436/ticket_db}
  slave:
    url: ${DB_SLAVE_URL:jdbc:postgresql://localhost:5436/ticket_db}
  username: ${DB_USER:ticketing}
  password: ${DB_PASSWORD:ticketing_secret}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.ticketing.ticket: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: redis
  kafka:
    bootstrap-servers: kafka:9092

db:
  master:
    url: jdbc:postgresql://postgres-master:5432/ticket_db
  slave:
    url: jdbc:postgresql://postgres-slave:5432/ticket_db

logging:
  level:
    com.ticketing.ticket: INFO

---
spring:
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: localhost
  kafka:
    bootstrap-servers: localhost:29092

db:
  master:
    url: jdbc:postgresql://localhost:5436/ticket_db
  slave:
    url: jdbc:postgresql://localhost:5436/ticket_db
