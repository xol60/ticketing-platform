server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Cache hashed static assets (Vite adds content hashes to filenames)
    location ~* \.(?:js|css|woff2?|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health probe — used by Docker HEALTHCHECK and load balancers
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — all unknown paths return index.html so React Router handles routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
