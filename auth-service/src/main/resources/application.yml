spring:
  application:
    name: auth-service

  # ── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns schema; Hibernate just validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true

  # ── Flyway ───────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

  # ── Security ─────────────────────────────────────────────────────────────────
  security:
    enabled: false # Gateway handles auth — Spring Security just provides BCrypt

server:
  port: 8081

# ── Database routing (master/slave) ──────────────────────────────────────────
db:
  master:
    url: ${DB_MASTER_URL:jdbc:postgresql://localhost:5436/auth_db}
  slave:
    url: ${DB_SLAVE_URL:jdbc:postgresql://localhost:5436/auth_db}
  username: ${DB_USER:ticketing}
  password: ${DB_PASSWORD:ticketing_secret}

# ── Auth business properties ──────────────────────────────────────────────────
auth:
  jwt:
    secret: ${JWT_SECRET:changeme_use_a_real_secret_in_production_256bits}
    access-token-expiry-seconds: 900
    refresh-token-expiry-seconds: 604800
    issuer: ticketing-platform
  token:
    max-refresh-tokens-per-user: 5
    revocation-ttl-seconds: 86400

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.ticketing.auth: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: redis

db:
  master:
    url: jdbc:postgresql://postgres-master:5432/auth_db
  slave:
    url: jdbc:postgresql://postgres-slave:5432/auth_db

logging:
  level:
    com.ticketing.auth: INFO

---
spring:
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: localhost
db:
  master:
    url: jdbc:postgresql://localhost:5436/auth_db
  slave:
    url: jdbc:postgresql://localhost:5436/auth_db
