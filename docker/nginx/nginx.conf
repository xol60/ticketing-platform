worker_processes auto;
events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" trace="$http_x_trace_id" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Rate limiting zones (coarse — fine control is in gateway app) ────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=200r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstream ─────────────────────────────────────────────────────────────
    upstream api_gateway {
        server api-gateway:8090;
        keepalive 64;
    }

    # ── HTTP → redirect (for dev this just proxies directly) ─────────────────
    server {
        listen 80;
        server_name _;

        # Max request body size
        client_max_body_size 1m;

        # Connection limit per IP
        limit_conn conn 100;

        # Global rate limit — burst allows short spikes
        limit_req zone=global burst=50 nodelay;

        # Stricter limit on auth endpoints
        location ~ ^/api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # Health check endpoint — no rate limit
        location /health {
            access_log off;
            proxy_pass http://api_gateway/actuator/health;
        }
    }
}
