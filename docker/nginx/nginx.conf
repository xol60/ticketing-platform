worker_processes auto;
events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" trace="$http_x_trace_id" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=200r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream api_gateway {
        server api-gateway:8090;
        keepalive 64;
    }

    upstream ticketing_ui {
        server ticketing-ui:80;
        keepalive 16;
    }

    # ── Server ───────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 1m;
        limit_conn conn 100;
        limit_req zone=global burst=50 nodelay;

        # ── Auth API — strict rate limit ──────────────────────────────────────
        location /auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://api_gateway;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── REST API → gateway ────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── SSE streams — disable buffering so events flush immediately ───────
        location ~* /api/.*/stream {
            proxy_pass             http://api_gateway;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_http_version     1.1;
            proxy_set_header       Connection "";
            # Critical for SSE: disable proxy buffering
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     3600s;
            chunked_transfer_encoding on;
        }

        # ── Gateway health probe ──────────────────────────────────────────────
        location /actuator/ {
            proxy_pass         http://api_gateway;
            proxy_set_header   Host              $host;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log off;
        }

        # ── React SPA — all other routes ──────────────────────────────────────
        location / {
            proxy_pass         http://ticketing_ui;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }
    }
}
