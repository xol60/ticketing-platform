# PostgreSQL Client Authentication Configuration
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Unix socket — always trusted (used by healthcheck psql inside the container)
local   all             all                                     trust

# IPv4/IPv6 localhost — trusted (container-internal tools)
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# All other network connections (app services via Docker bridge)
host    all             all             0.0.0.0/0               scram-sha-256

# Streaming replication from slave container (any Docker-network address)
host    replication     replicator      0.0.0.0/0               md5
