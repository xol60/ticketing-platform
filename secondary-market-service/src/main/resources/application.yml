spring:
  application:
    name: secondary-market-service

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

server:
  port: 8088

# ── Upstream service URLs ────────────────────────────────────────────────────
clients:
  ticket-service:
    url: ${TICKET_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: 500
    read-timeout-ms: 2000

db:
  master:
    url: ${DB_MASTER_URL:jdbc:postgresql://localhost:5432/secondary_market_db}
  slave:
    url: ${DB_SLAVE_URL:jdbc:postgresql://localhost:5433/secondary_market_db}
  username: ${DB_USER:ticketing}
  password: ${DB_PASSWORD:ticketing_secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.ticketing.secondary: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: redis
  kafka:
    bootstrap-servers: kafka:9092

db:
  master:
    url: jdbc:postgresql://postgres-master:5432/secondary_market_db
  slave:
    url: jdbc:postgresql://postgres-slave:5432/secondary_market_db

clients:
  ticket-service:
    url: http://ticket-service:8082
    connect-timeout-ms: 500
    read-timeout-ms: 2000

logging:
  level:
    com.ticketing.secondary: INFO

---
spring:
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: localhost
  kafka:
    bootstrap-servers: localhost:29092

db:
  master:
    url: jdbc:postgresql://localhost:5432/secondary_market_db
  slave:
    url: jdbc:postgresql://localhost:5433/secondary_market_db
