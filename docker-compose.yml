version: "3.9"

networks:
  ticketing-net:
    driver: bridge

volumes:
  postgres-master-data:
  postgres-slave-data:
  redis-data:
  kafka-data:

services:

  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres-master:
    image: postgres:16-alpine
    container_name: postgres-master
    environment:
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing_secret
      POSTGRES_DB: ticketing
    volumes:
      - postgres-master-data:/var/lib/postgresql/data
      - ./docker/postgres/init-master.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/postgres/postgresql-master.conf:/etc/postgresql/postgresql.conf
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    # ports: not exposed in base — use docker-compose.dev.yml for local access
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing -d ticketing && psql -U ticketing -d ticketing -tAc \"SELECT 1 FROM pg_database WHERE datname='secondary_market_db'\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # Streaming replica — serves all DB_SLAVE_URL reads.
  # init-slave.sh checks for standby.signal (written by pg_basebackup -R)
  # so it correctly skips re-initialisation on container restarts.
  postgres-slave:
    image: postgres:16-alpine
    container_name: postgres-slave
    environment:
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres-slave-data:/var/lib/postgresql/data
      - ./docker/postgres/init-slave.sh:/init-slave.sh
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
    entrypoint: ["/bin/bash", "/init-slave.sh"]
    depends_on:
      postgres-master:
        condition: service_healthy
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing -d ticketing && psql -U ticketing -d ticketing -tAc \"SELECT 1 FROM pg_database WHERE datname='secondary_market_db'\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    # ports: not exposed in base — use docker-compose.dev.yml for local access
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 1048576
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    # ports: not exposed in base — use docker-compose.dev.yml for local access
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./docker/kafka/create-topics.sh:/create-topics.sh
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    networks:
      - ticketing-net

  # ─────────────────────────────────────────────
  # NGINX
  # ─────────────────────────────────────────────

  ticketing-ui:
    build:
      context: ./ticketing-ui
      dockerfile: Dockerfile
    container_name: ticketing-ui
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api-gateway
      - ticketing-ui
    networks:
      - ticketing-net

  # ─────────────────────────────────────────────
  # APPLICATION SERVICES
  # ─────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-changeme_use_a_real_secret_in_production_256bits}
    # ports: not exposed in base — Nginx reaches gateway via internal DNS
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_MASTER_URL: jdbc:postgresql://postgres-master:5432/auth_db
      DB_SLAVE_URL: jdbc:postgresql://postgres-slave:5432/auth_db
      DB_USER: ticketing
      DB_PASSWORD: ticketing_secret
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-changeme_use_a_real_secret_in_production_256bits}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-master:
        condition: service_healthy
      postgres-slave:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - ticketing-net

  ticket-service:
    build:
      context: .
      dockerfile: ticket-service/Dockerfile
    container_name: ticket-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_MASTER_URL: jdbc:postgresql://postgres-master:5432/ticket_db
      DB_SLAVE_URL: jdbc:postgresql://postgres-slave:5432/ticket_db
      DB_USER: ticketing
      DB_PASSWORD: ticketing_secret
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-master:
        condition: service_healthy
      postgres-slave:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - ticketing-net

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_MASTER_URL: jdbc:postgresql://postgres-master:5432/order_db
      DB_SLAVE_URL: jdbc:postgresql://postgres-slave:5432/order_db
      DB_USER: ticketing
      DB_PASSWORD: ticketing_secret
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TICKET_SERVICE_URL: http://ticket-service:8082
    depends_on:
      postgres-master:
        condition: service_healthy
      postgres-slave:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - ticketing-net

  saga-orchestrator:
    build:
      context: .
      dockerfile: saga-orchestrator/Dockerfile
    container_name: saga-orchestrator
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres-master:5432/saga_db
      DB_USER: ticketing
      DB_PASSWORD: ticketing_secret
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres-master:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - ticketing-net

  pricing-service:
