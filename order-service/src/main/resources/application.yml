spring:
  application:
    name: order-service

  # ── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns schema; Hibernate just validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true

  # ── Flyway ───────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

server:
  port: 8083

# ── Upstream service URLs ────────────────────────────────────────────────────
clients:
  ticket-service:
    url: ${TICKET_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: 500
    read-timeout-ms: 1000

# ── Database routing (master/slave) ──────────────────────────────────────────
db:
  master:
    url: ${DB_MASTER_URL:jdbc:postgresql://localhost:5436/order_db}
  slave:
    url: ${DB_SLAVE_URL:jdbc:postgresql://localhost:5436/order_db}
  username: ${DB_USER:ticketing}
  password: ${DB_PASSWORD:ticketing_secret}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.ticketing.order: DEBUG
    org.hibernate.SQL: WARN
    org.apache.kafka: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: redis
  kafka:
    bootstrap-servers: kafka:9092

db:
  master:
    url: jdbc:postgresql://postgres-master:5432/order_db
  slave:
    url: jdbc:postgresql://postgres-slave:5432/order_db

clients:
  ticket-service:
    url: http://ticket-service:8082
    connect-timeout-ms: 500
    read-timeout-ms: 1000

logging:
  level:
    com.ticketing.order: INFO

---
spring:
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: localhost
  kafka:
    bootstrap-servers: localhost:29092

db:
  master:
    url: jdbc:postgresql://localhost:5436/order_db
  slave:
    url: jdbc:postgresql://localhost:5436/order_db
