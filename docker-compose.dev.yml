# ── Development overrides ─────────────────────────────────────────────────────
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# What this adds:
#   - Exposes every service port directly on localhost (useful for IntelliJ, Postman, etc.)
#   - Enables DEBUG logging + SQL query logging for every service
#   - Remote JVM debug port (5005+offset) on every service
#   - All Actuator endpoints exposed
#   - Relaxed Postgres connection pool for easier local debugging

version: "3.9"

services:

  # ── Infrastructure extras ───────────────────────────────────────────────────

  postgres-master:
    ports:
      - "5436:5432"   # already in base; explicit here for clarity

  redis:
    ports:
      - "6379:6379"

  kafka:
    ports:
      - "29092:29092"

  # ── Frontend ────────────────────────────────────────────────────────────────
  # Production build served by Nginx — accessible at http://localhost:3000 (direct)
  # or http://localhost (via main Nginx proxy).
  # For hot-reload during UI development, run outside Docker:
  #   cd ticketing-ui && npm run dev   → http://localhost:3000

  ticketing-ui:
    ports:
      - "3000:80"   # direct UI access, bypasses main nginx

  # ── Application services — expose ports + debug flags ───────────────────────

  api-gateway:
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      LOGGING_LEVEL_COM_TICKETING: DEBUG
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005

  auth-service:
    ports:
      - "8081:8081"
      - "5081:5005"   # remote debug
    environment:
      SPRING_PROFILES_ACTIVE: docker
      LOGGING_LEVEL_COM_TICKETING: DEBUG
      SPRING_JPA_SHOW_SQL: "true"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005

